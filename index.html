<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inspira</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="theme-bridge.js" defer></script>
  </head>
  <body>
    <main class="page">
      <header class="header">
        <div class="brand">
          <div class="logo" aria-hidden="true">
            <!-- Logo-Bild hier ändern -->
            <img
              class="logo-image"
              src="https://www.comingwest.de/fileadmin/pfarreien/_processed_/7/e/csm_ST_CHRISTOPH_800x500byP.Kopp_424e700057.jpg"
              alt="Kirche St. Christoph Friedrichshofen"
            />
          </div>
          <div class="brand-name">Inspira</div>
        </div>

        <div class="content-block">
          <!-- Titel dieser Seite hier ändern -->
          <h1 class="page-title">Live-Übersetzung</h1>

          <!-- Kurzen Beschreibungstext hier ändern -->
          <p class="page-description">
            Hier wird die Übersetzung für Besucherinnen und Besucher direkt
            eingeblendet. Darstellung und Größe des Livestreams kannst du in
            der Datei <code>styles.css</code> anpassen. Die Theme-Werte für den
            Inhalt im <code>iframe</code> stehen dort ebenfalls bereit.
          </p>
        </div>
      </header>

      <section class="frame">
        <!-- Livestream-URL hier ändern -->
        <iframe
          id="livestream-frame"
          class="livestream-frame"
          src="https://inspira-relay.robert-lehmann.workers.dev"
          allow="fullscreen"
          title="Inspira"
        ></iframe>
      </section>
    </main>
  </body>
</html>
